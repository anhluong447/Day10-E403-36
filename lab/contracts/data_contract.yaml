# Data contract — Lab Day 10 (tiếp nối artifact CS + IT Helpdesk)
# Sinh viên bổ sung owner, SLA freshness, và nguồn canonical.

version: "1.0"
dataset: "kb_chunk_export"
owner_team: "CS IT Helpdesk Team"

schema_cleaned:
  chunk_id:
    type: string
    required: true
    description: "ID ổn định sau clean (thường hash hoặc doc_id + seq)"
  doc_id:
    type: string
    required: true
    description: "Khóa logic tài liệu nguồn (vd policy_refund_v4)"
  chunk_text:
    type: string
    required: true
    constraints:
      min_length: 8
      max_length: 2000
  effective_date:
    type: date
    required: true
  exported_at:
    type: datetime
    required: true

quality_rules:
  - id: "no_duplicate_chunk_text"
    severity: "warn"
  - id: "no_stale_refund_window"
    description: "Không được để chunk policy refund chứa cửa sổ 14 ngày (lệch so với v4 = 7 ngày)"
    severity: "halt"
  # Sprint 2 — Rules mới
  - id: "strip_bom_and_control_chars"
    description: "Loại BOM (\\ufeff) và ASCII control chars khỏi doc_id và chunk_text trước mọi rule khác. Phổ biến khi export CSV từ Excel trên Windows."
    severity: "fix"
  - id: "no_future_effective_date"
    description: "Quarantine chunk có effective_date > 180 ngày kể từ exported_at — policy chưa có hiệu lực không nên đưa vào RAG."
    severity: "halt"
    threshold_days: 180
  - id: "no_oversized_chunk"
    description: "Quarantine chunk_text > 2000 ký tự — dấu hiệu merge lỗi hoặc dump toàn bộ document. all-MiniLM-L6-v2 giới hạn 256 tokens."
    severity: "halt"
    max_length: 2000

freshness:
  measured_at: "publish"  # ingest | cleaned | publish
  sla_hours: 24
  alert_channel: "#data-pipeline-alerts"

canonical_sources:
  - path: "data/docs/policy_refund_v4.txt"
    doc_id: "policy_refund_v4"
  - path: "data/docs/sla_p1_2026.txt"
    doc_id: "sla_p1_2026"
  - path: "data/docs/it_helpdesk_faq.txt"
    doc_id: "it_helpdesk_faq"
  - path: "data/docs/hr_leave_policy.txt"
    doc_id: "hr_leave_policy"

# Baseline allowlist export — nhóm mở rộng doc mới phải đồng bộ cleaning_rules + contract.
allowed_doc_ids:
  - policy_refund_v4
  - sla_p1_2026
  - it_helpdesk_faq
  - hr_leave_policy

# Merit/Distinction: có thể đưa cutoff versioning vào env và tham chiếu ở đây (tránh hard-code trong code).
policy_versioning:
  hr_leave_min_effective_date: "2026-01-01"
